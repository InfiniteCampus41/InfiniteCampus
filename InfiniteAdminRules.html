<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-7SV03ZXJ9R">
        </script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-7SV03ZXJ9R');
        </script>
        <title>
            Infinite Campus
        </title>
        <link id="dynamic-favicon" rel="icon" type="image/png" href="/res/icon.png">
        <link rel="stylesheet" href="global.css">
        <meta name="keywords" content="Infinite campus,infinite campus,Infinite Campus,infinite Campus">
        <meta name="description" content="Infinite Campus Is A International Buisiness And Has Good Devs">
        <meta property="og:title" content="Infinite Campus">
        <meta property="og:description" content="Infinite Campus Is An International Buisiness And Has Good Devs">
        <meta property="og:url" content="https://www.infinitecampus.xyz">
        <meta name="theme-color" content="#8cbe37">
        <link rel="manifest" href="/manifest.json">
        <meta content="/res/icon.png" property="og:image">
        <script src="main.js">
        </script>
        <script type="module" src="login.js">
        </script>
        <style>
            #rules-toolbar {
                display: flex;
                align-items: center;
                gap: 0.6rem;
                margin-bottom: 0.6rem;
                flex-wrap: wrap;
            }
            #rules-status {
                font-size: 0.85rem;
                opacity: 0.85;
                margin-left: auto;
            }
            #rules-wrap {
                display: flex;
                border: 1px solid #3e3e3e;
                border-radius: 6px;
                overflow: hidden;
                background: #1e1e2e;
                font-family: "Fira Code", "Cascadia Code", "Consolas", monospace;
                font-size: 0.82rem;
                line-height: 1.6;
                min-height: 420px;
                max-height: 70vh;
                overflow-y: auto;
            }
            #rules-gutter {
                min-width: 2.8rem;
                padding: 0.75rem 0.5rem;
                text-align: right;
                color: #555;
                background: #181825;
                border-right: 1px solid #313145;
                user-select: none;
                line-height: 1.6;
                font-size: 0.78rem;
            }
            #rules-gutter div {
                height: 1.6em;
            }
            #rules-editor {
                flex: 1;
                padding: 0.75rem 1rem;
                outline: none;
                overflow:scroll;
                white-space: pre;
                word-break: break-all;
                overflow-wrap: anywhere;
                color: #cdd6f4;
                caret-color: #cdd6f4;
                min-height: 420px;
            }
            .hl-rules-root { 
                color: #89b4fa; 
                font-weight: 600; 
            }
            .hl-rule-key { 
                color: #a6e3a1; 
                font-weight: 600; 
            }
            .hl-wildcard { 
                color: #cba6f7; 
            }
            .hl-key { 
                color: #89dceb; 
            }
            .hl-auth { 
                color: #fab387; 
            }
            .hl-data { 
                color: #f9e2af; 
            }
            .hl-string { 
                color: #a6e3a1;
            }
            .hl-bool { 
                color: #f38ba8; 
                font-weight: 600;
            }
            .hl-null { 
                color: #6c7086; 
                font-style: italic; 
            }
            .hl-number { 
                color: #fab387; 
            }
        </style>
    </head>
    <body>
        <main>
            <center>
                <h1 class="tptxt">
                    Rules Editor
                </h1>
                <hr>
            </center>
            <div id="rules-section">
                <div id="rules-toolbar">
                    <button id="rules-save-btn" class="button">
                        Save
                    </button>
                    <button id="rules-refresh-btn" class="button">
                        Refresh
                    </button>
                    <span id="rules-status">
                        Loading
                    </span>
                </div>
                <div id="rules-wrap">
                    <div id="rules-gutter">
                    </div>
                    <div id="rules-editor" contenteditable="true" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">
                    </div>
                </div>
            </div>
            <div id="panel-btn" class="button">
                <i class="bi bi-arrow-left">
                </i>
            </div>
            <div id="panel">
                <div id="panel-header">
                    <span id="panel-back" class="button">
                        <i class="bi bi-arrow-left">
                        </i>
                    </span>
                    <span id="panel-title" class="tptxt">
                        Current Blocked URLs
                    </span>
                    <span></span>
                </div>
                <div id="panel-search">
                    <input class="button" id="search" placeholder="Search URLs...">
                </div>
                <div id="blocked-list">
                </div>
                <button id="add-url-btn" class="button">
                    Add URL
                </button>
            </div>
            <div id="add-panel">
                <div id="add-inner">
                    <div id="add-close">
                        <i class="bi bi-x-lg">
                        </i>
                    </div>
                    <h2>
                        Add URL
                    </h2>
                    <input id="add-url-input" class="button" placeholder="URL">
                    <input id="add-reason-input" class="button" placeholder="Reason">
                    <div id="add-error">
                    </div>
                    <button class="button" onclick="addUrl()">
                        Submit
                    </button>
                </div>
            </div>
        </main>
        <script type="module" src="adminrules.js">
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
        </script>
        <script src="frame.js">
        </script>
    </body>
</html>
