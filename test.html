    <body>
        <main>
            <center>
    <h1 class="tptxt">
        Virtual Machine
    </h1>
    <hr>
    <br>
    <div>
        <input id="urlInput" class="button" placeholder="Enter URL Here">
        <button id="goBtn" class="button">Go!</button>
        <span id="current" class="btxt"></span>
    </div>
    <div id="browsers">
    </div>
    <script type="module">
        import Hyperbeam from "https://unpkg.com/@hyperbeam/web@latest/dist/index.js";
        const urlInput = document.getElementById("urlInput");
        const goBtn = document.getElementById("goBtn");
        const currentSite = document.getElementById("current");
        const virtualComputerDiv = document.getElementById("browsers");
        const resp = await fetch(`${a}/hypervm`);
        const data = await resp.json();
        const hb = await Hyperbeam(virtualComputerDiv, data.embed_url);
        function formatURL(input) {
            input = input.trim();
            if (!input.startsWith("http://") && !input.startsWith("https://")) {
                input = "https://" + input;
            }
            return input;
        }
        goBtn.addEventListener("click", () => {
            const url = formatURL(urlInput.value);
            hb.tabs.update({ url });
        });
        urlInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                goBtn.click();
            }
        });
        hb.tabs.onUpdated.addListener((tabId, changeInfo) => {
            if (changeInfo.title) {
                currentSite.innerText = changeInfo.title;
            }
        });
    </script>
</center>
        </main>
