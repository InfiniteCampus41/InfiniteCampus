<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-7SV03ZXJ9R">
        </script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-7SV03ZXJ9R');
        </script>
		<title>
			Infinite Campus
		</title>
		<link id="dynamic-favicon" rel="icon" type="image/png" href="/res/icon.png">
        <link rel="stylesheet" href="./global.css">
        <meta name="keywords" content="Infinite campus,infinite campus,Infinite Campus,infinite Campus">
        <meta name="description" content="Infinite Campus is an international buisiness and has good devs">
        <meta property="og:title" content="Infinite Campus">
        <meta property="og:description" content="Infinite Campus Is An International Buisiness And Has Good Devs">
        <meta property="og:url" content="https://www.infinitecampus.xyz">
        <meta name="theme-color" content="#8cbe37">
        <link rel="manifest" href="./manifest.json">
        <meta content="/res/icon.png" property="og:image">
		<script src="./games.js" defer>
		</script>
		<script src="./main.js">
        </script>
        <script src="./drypopup.js" type="module">
        </script>
        <style>
            #pxyFcrn, .popup2, .settings-button {
                display:none;
            }
        </style>
	</head>
	<body>
        <main>
            <section id="gameLibrary">
                <center>
                    <h1 class="tptxt">
                        Games
                    </h1>
                    <hr>
                    <br>
                    <div id="glSearchWrap">
                        <input type="text" id="glSearch" placeholder="Search Games">
                        <i class="ic ic-search">
                        </i>
                    </div>
                    <div id="glSortWrap">
                        <span>
                            Sort by:
                        </span>
                        <select id="glSort">
                            <option value="popularity">
                                Popularity
                            </option>
                            <option value="name">
                                Name
                            </option>
                            <option value="date">
                                Date Added
                            </option>
                        </select>
                    </div>
                    <div id="glGrid">
                    </div>
                    <div id="glPagination">
                        <button id="glPrevPage" class="button" style="display:none;">
                            Previous Page
                        </button>
                        <button id="glNextPage" class="button" style="display:none;">
                            Next Page
                        </button>
                    </div>
                    <br>
                    <br>
                    <div id="donation-auto-msg">
                        <p class="btxt">
                            Infinite Campus Is A Free Service, But It Isn't Free To Run. If You Would Like To Support Us, Consider Donating
                        </p>
                        <a class="button apbtn" href="/InfiniteDonaters.html">
                            Donate
                        </a>
                    </div>
                    <br>
                    <p class="btxt">
                        All New Updates Are On The Updates Page
                        <br>
                        Also Join The
                        <a href="" class="discord" id="discordBtn" target="_blank">
                            Discord
                        </a>
                        <p id="discordLink" class="btxt">
                        </p>
                    </p>
                    <br>
                    <br>
                    <br>
                </center>
            </section>
            <div id="glPlayerOverlay" style="display:none;">
                <iframe id="glPlayerFrame"></iframe>
                <div id="glPlayerBar">
                    <button id="glCloseBtn" title="Close">
                        <i class="ic ic-x">
                        </i>
                    </button>
                    <span style="flex:1">
                    </span>
                    <button id="glScrollLockBtn" title="Toggle Scroll Lock">
                        <i class="ic ic-lock">
                        </i>
                    </button>
                    <button id="glNewTabBtn" title="Open In New Tab">
                        <i class="ic ic-box-arrow-up-right">
                        </i>
                    </button>
                    <button id="glFullscreenBtn" title="Fullscreen">
                        <i class="ic ic-fullscreen">
                        </i>
                    </button>
                </div>
                <div id="glPlayerMeta">
                    <span id="glMetaType">
                    </span> 
                    <i class="ic ic-dot">
                    </i>
                    <span id="glMetaId">
                    </span> 
                    <i class="ic ic-dot">
                    </i>
                    Added 
                    <span id="glMetaDate">
                    </span> 
                    <i class="ic ic-dot">
                    </i>
                    By 
                    <a id="glMetaUploader" target="_blank" rel="noopener noreferrer">
                    </a>
                    <p id="glMetaDesc">
                    </p>
                </div>
            </div>
        </main>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
        </script>
        <script src="./frame.js">
        </script>
	</body>
</html>
