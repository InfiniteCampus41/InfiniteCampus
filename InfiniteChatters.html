<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-7SV03ZXJ9R">
        </script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-7SV03ZXJ9R');
        </script>
        <title>
            Infinite Campus
        </title>
        <link id="dynamic-favicon" rel="icon" type="image/png" href="/res/icon.png">
        <link rel="stylesheet" href="./global.css">
        <meta name="keywords" content="Infinite campus,infinite campus,Infinite Campus,infinite Campus">
        <meta name="description" content="Infinite Campus is an international buisiness and has good devs">
        <meta property="og:title" content="Infinite Campus">
        <meta property="og:description" content="Infinite Campus Is An International Buisiness And Has Good Devs">
        <meta property="og:url" content="https://www.infinitecampus.xyz">
        <meta name="theme-color" content="#8cbe37">
        <link rel="manifest" href="./manifest.json">
        <meta content="/res/icon.png" property="og:image">
        <script src="./main.js">
        </script>
        <style>
            body {
                background: #111;
                color: black;
                overflow: hidden;
            }
            #main {
                display: flex;
                height: calc(100vh - (var(--headerHeight) + var(--footerHeight)));
                overflow: hidden;
            }
            #messages {
                min-width: 0;
                flex: 1;
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            button:not(#mobileMenuBtn):not(#closeMobilePanel):not(.dropdown-toggle):not(.dropdown.themed button):not(#weatherContainer div button) {
                background: #333;
                border: 1px solid #555;
                color: #eee;
                padding: 10px 14px;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                transition: 0.2s ease;
            }
            button:not(#mobileMenuBtn):not(#closeMobilePanel):not(.dropdown-toggle):not(.dropdown.themed button):not(#weatherContainer div button):hover {
                background: #444;
                border-color: #777;
            }
            button:not(#mobileMenuBtn):not(#closeMobilePanel):not(.dropdown-toggle):not(.dropdown.themed button):not(#weatherContainer div button):active {
                background: #222;
            }
            ::-webkit-scrollbar {
                width: 15px;
                height: 20px;
            }
            ::-webkit-scrollbar-track { 
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background-color: grey;
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover { 
                background-color: #888; 
            }
            ::-webkit-scrollbar-button { 
                display: none; 
            }
            #channels li span {
                display:none;
            }
            #channels li:hover span {
                display:block;
            }
            .closeBtn {
                border:none !important;
                background:none !important;
                padding: 0px !important;
            }
        </style>
    </head>
    <body>
        <main>
            <button id="mobileToggle" class="btn btn-secondary btn-sm">
                <i class="ic ic-list"></i>
            </button>
            <div id="main" style="color:white">
                <div id="sidebar">
                    <div id="profileSection">
                        <div id="profileRow" style="cursor:pointer">
                            <img id="sidebarPfp">
                            <div id="profileInfo" style="display: flex; flex-direction: column;">
                                <span id="username" style="font-weight:bold;">
                                </span>
                                <span id="role" style="margin-top:2px;">
                                </span>
                                <span id="bio" style="margin-top:2px;">
                                </span>
                                <label id="mentionToggleLabel" class="switch" style="width:100%;display:flex;justify-content:space-around" onclick="event.stopPropagation()">
                                    <input type="checkbox" id="mentionToggle" style="margin-right:5px" onclick="event.stopPropagation()">
                                    <span class="slider">
                                    </span>
                                    <span style="margin-left:40px;">
                                        Show Mentions
                                    </span>
                                </label>
                            </div>
                        </div>
                        <div id="mentionsContainer" class="mt-2">
                            <div id="mentionNotif" style="display:none; cursor:pointer; color:yellow; font-weight:bold;">
                                <i class="ic ic-bell-fill"></i> You Were Mentioned!
                            </div>
                            <div id="mentionsList" style="display:none;">
                            </div>
                        </div>
                    </div>
                    <div id="sidebarTabs">
                        <button id="tabGlobalBtn" class="sidebarTabBtn active" type="button">
                            <i class="ic ic-globe2"></i> Global Chat
                        </button>
                        <button id="tabPrivateBtn" class="sidebarTabBtn" type="button">
                            <i class="ic ic-people-fill"></i> Private Chats
                        </button>
                    </div>
                    <div id="adminControls" style="display:none;height:0px;justify-content:flex-end;">
                        <button id="addChannelBtn" style="color:white;background:none;border:none;height:fit-content;">
                            <i class="ic ic-plus-lg" title="Add Channel">
                            </i>
                        </button>
                    </div>
                    <div id="globalSection">
                        <div id="adminControlsHolder"></div>
                        <h4 class="text-center mt-3">
                            Channels
                        </h4>
                        <hr>
                        <ul id="channels" class="p-0">
                        </ul>
                    </div>
                    <div id="privateSection" style="display:none;">
                        <h4 class="text-center mt-3">
                            Private Chats
                        </h4>
                        <hr>
                        <ul id="privateList" class="p-0">
                        </ul>
                    </div>
                </div>
                <div id="messages">
                    <div id="messagesTopBar">
                        <button id="groupInfoBtn" style="display:none;" type="button" title="Group Info">
                            <i class="ic ic-info-circle"></i>
                        </button>
                    </div>
                    <div id="privateMenu" style="display:none;">
                        <fieldset>
                            <legend>Direct Messages</legend>
                            <input type="text" id="dmUsernameInput" placeholder="Enter A Username">
                            <button id="dmStartBtn" type="button">Start Chat</button>
                        </fieldset>
                        <fieldset>
                            <legend>Create Group</legend>
                            <input type="text" id="groupNameInput" placeholder="Group Name">
                            <button id="groupCreateBtn" type="button">Create</button>
                        </fieldset>
                        <fieldset>
                            <legend>Join Group</legend>
                            <input type="text" id="groupInviteInput" placeholder="Invite Code">
                            <button id="groupJoinBtn" type="button">Join</button>
                        </fieldset>
                    </div>
                    <div id="groupInfoPanel" style="display:none;">
                        <div id="groupInfoHeader">
                            <h3 id="groupInfoName"></h3>
                            <button id="groupInfoCloseBtn" class="closeBtn" type="button"><i class="ic ic-x-lg"></i></button>
                        </div>
                        <div id="groupInfoInvite">
                            <div><strong>Invite Link:</strong> <span id="groupInfoInviteLink"></span></div>
                            <div><strong>Invite Code:</strong> <span id="groupInfoInviteCode"></span></div>
                        </div>
                        <div id="groupInfoOwnerActions" style="display:none;">
                            <button id="groupRenameBtn" type="button">Rename Group</button>
                            <button id="groupResetInviteBtn" type="button">Reset Invite</button>
                            <button id="groupTransferBtn" type="button">Transfer Ownership</button>
                            <button id="groupDeleteBtn" type="button">Delete Group</button>
                        </div>
                        <div id="groupInfoLeaveActions" style="display:none;">
                            <button id="groupLeaveBtn" type="button">Leave Group</button>
                        </div>
                        <h4>Members</h4>
                        <ul id="groupInfoMembers" class="p-0"></ul>
                    </div>
                    <div id="chatLog">
                    </div>
                    <div class="p-3">
                        <div id="mentionHint" style="display:none; color:#aaa; font-size:0.9em; margin-bottom:4px;">
                            Press Tab To Mention User
                        </div>
                        <div id="mentionMenu">
                        </div>
                        <div id="reply" style="display:none;">
                        </div>
                        <div id="chatMsgFunctions">
                            <textarea id="chatInput" placeholder="Type A Message" rows="3"></textarea>
                        </div>
                        <button id="sendBtn">
                            <i class="ic ic-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
        </script>
        <script async src="https://www.tiktok.com/embed.js">
        </script>
        <script type="module" src="chat.js">
        </script>
        <script>
            const sidebar = document.getElementById("sidebar");
            const mobileToggle = document.getElementById("mobileToggle");
            mobileToggle.onclick = () => {
                sidebar.classList.toggle("open");
            };
        </script>
        <script src="frame.js">
        </script>
    </body>
</html>
