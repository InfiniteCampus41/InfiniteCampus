<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-7SV03ZXJ9R">
        </script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-7SV03ZXJ9R');
        </script>
        <title>
            Infinite Campus
        </title>
        <link id="dynamic-favicon" rel="icon" type="image/png" href="/res/icon.png">
        <link rel="stylesheet" href="global.css">
        <meta name="keywords" content="Infinite campus,infinite campus,Infinite Campus,infinite Campus">
        <meta name="description" content="Infinite Campus Is A International Buisiness And Has Good Devs">
        <meta property="og:title" content="Infinite Campus">
        <meta property="og:description" content="Infinite Campus Is An International Buisiness And Has Good Devs">
        <meta property="og:url" content="https://www.infinitecampus.xyz">
        <meta name="theme-color" content="#8cbe37">
        <link rel="manifest" href="/manifest.json">        
        <meta content="/res/icon.png" property="og:image">
        <script src="main.js">
        </script>
        <style>
            .container {
                max-width: 1200px;
                padding: 28px 20px;
            }
            .search-box {
                display: flex;
                gap: 10px;
                margin-bottom: 28px;
            }
            .search-box input {
                flex: 1;
            }
            #results {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                gap: 18px;
            }
            .song-card {
                background: #111115;
                border-radius: 14px;
                padding: 14px;
                cursor: pointer;
                transition: background 0.18s, transform 0.18s;
                position: relative;
            }
            .song-card:hover {
                background: #18181e;
                transform: translateY(-3px);
            }
            .song-card.playing {
                background: #18181e;
            }
            .song-card img.cover {
                width: 100%;
                border-radius: 9px;
                aspect-ratio: 1/1;
                object-fit: cover;
                margin-bottom: 12px;
                display: block;
            }
            .song-card .play-overlay {
                position: absolute;
                top: 14px; left: 14px;
                right: 14px;
                aspect-ratio: 1/1;
                background: rgba(0,0,0,0.45);
                border-radius: 9px;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                transition: opacity 0.18s;
            }
            .song-card:hover .play-overlay, .song-card.playing .play-overlay { 
                opacity: 1; 
            }
            .play-overlay i {
                font-size: 2.2rem;
                color: white;
            }
            .song-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 5px;
                white-space: nowrap;
                color:white;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .album-name {
                font-size: 12px;
                color: #666;
                margin-bottom: 5px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .artist-link {
                color: #108028;
                cursor: pointer;
                font-size: 13px;
                display: inline-block;
            }
            .artist-link:hover { 
                text-decoration: underline; 
            }
            .artist-header {
                position: relative;
                height: 300px;
                border-radius: 18px;
                overflow: hidden;
                margin-bottom: 28px;
                background: linear-gradient(to bottom, #2a2a3a, #0a0a0c);
            }
            .artist-banner {
                width: 100%;
                height: 100%;
                object-fit: cover;
                opacity: 0.3;
            }
            .artist-overlay {
                position: absolute;
                bottom: 24px; 
                left: 24px;
                display: flex;
                align-items: flex-end;
                gap: 20px;
            }
            .artist-avatar {
                width: 140px;
                height: 140px;
                border-radius: 50%;
                object-fit: cover;
                border: 3px solid rgba(255,255,255,0.2);
            }
            .artist-details h2 {
                font-family: 'Syne', sans-serif;
                font-size: 2.4rem;
                font-weight: 800;
                letter-spacing: -0.03em;
            }
            .artist-details p { 
                color: #8888aa; 
                font-size: 14px; 
                margin-top: 4px; }
            .section-title {
                font-family: 'Syne', sans-serif;
                font-size: 1.3rem;
                font-weight: 700;
                margin: 28px 0 14px;
            }
            .track {
                padding: 13px 16px;
                border-radius: 10px;
                background: #111115;
                margin-bottom: 7px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 12px;
                transition: background 0.15s;
                font-size: 14px;
            }
            .track.playing { 
                background: #18181e; 
                color: #108028; 
            }
            .track .track-num { 
                width: 22px; 
                color: #8888aa; 
                font-size: 13px; 
                text-align: right; 
                flex-shrink: 0; 
            }
            .album-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
                gap: 14px;
            }
            .album-card {
                background: #111115;
                border-radius: 14px;
                padding: 12px;
                cursor: pointer;
                transition: background 0.15s, transform 0.15s;
            }
            .album-card:hover { 
                background: #18181e; 
                transform: translateY(-3px); 
            }
            .album-card img {
                width: 100%;
                border-radius: 8px;
                margin-bottom: 10px;
                display: block;
            }
            .album-card div { 
                font-size: 13px; 
                color: #8888aa; 
            }
            .album-card .album-title { 
                font-size: 14px; 
                color: #f0f0f5; 
                font-weight: 500; 
                margin-bottom: 4px; 
            }
            .song-detail-header {
                position: relative;
                height: 280px;
                border-radius: 18px;
                overflow: hidden;
                margin-bottom: 28px;
                background: linear-gradient(to bottom, #2a2a3a, #0a0a0c);
            }
            .song-detail-header .banner-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                opacity: 0.25;
            }
            .song-detail-overlay {
                position: absolute;
                bottom: 24px; 
                left: 24px;
                display: flex;
                align-items: flex-end;
                gap: 20px;
            }
            .song-cover-lg {
                width: 130px;
                height: 130px;
                border-radius: 12px;
                object-fit: cover;
            }
            .song-detail-info h2 {
                font-family: 'Syne', sans-serif;
                font-size: 2rem;
                font-weight: 800;
            }
            .song-detail-info a {
                color: #108028;
                cursor: pointer;
                font-size: 14px;
                margin-top: 6px;
                display: block;
                text-decoration: none;
            }
            .song-detail-info a:hover { 
                text-decoration: underline; 
            }
            .play-song-btn {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                margin-top: 14px;
                padding: 12px 28px;
                background: linear-gradient(135deg, #108028, #1db954);
                border: none;
                border-radius: 999px;
                color: white;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                font-family: 'DM Sans', sans-serif;
                transition: opacity 0.2s;
            }
            .play-song-btn:hover { 
                opacity: 0.85; 
            }
            #player {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                height: 80px;
                background: rgba(14, 14, 18, 0.92);
                backdrop-filter: blur(22px);
                -webkit-backdrop-filter: blur(22px);
                border-top: 1px solid #222228;
                display: flex;
                align-items: center;
                padding: 0 20px;
                gap: 18px;
                z-index: 1000;
                transform: translateY(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #player.visible { 
                transform: translateY(0); 
            }
            .player-info {
                display: flex;
                align-items: center;
                gap: 12px;
                min-width: 200px;
                flex: 1;
            }
            #playerThumb {
                width: 46px;
                height: 46px;
                border-radius: 8px;
                background: #222228;
                object-fit: cover;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #8888aa;
                overflow: hidden;
            }
            #playerThumb img { 
                width: 100%; 
                height: 100%; 
                object-fit: cover; 
            }
            .player-text { 
                overflow: hidden; 
            }
            #playerTitle {
                font-size: 13px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 180px;
            }
            #playerArtist {
                font-size: 12px;
                color: #8888aa;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 180px;
                cursor: pointer;
            }
            #playerArtist:hover { 
                color: #108028; 
                text-decoration: underline; 
            }
            .player-controls {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                flex: 2;
            }
            .player-btns {
                display: flex;
                align-items: center;
                gap: 18px;
            }
            .ctrl-btn {
                background: none;
                border: none;
                color: #8888aa;
                font-size: 16px;
                cursor: pointer;
                padding: 4px;
                transition: color 0.15s, transform 0.15s;
                line-height: 1;
            }
            .ctrl-btn:hover { 
                color: #f0f0f5; 
                transform: scale(1.1); 
            }
            .ctrl-btn.active { 
                color: #108028; 
            }
            #playPauseBtn {
                background: linear-gradient(135deg, #108028, #1db954);
                color: white;
                width: 38px; height: 38px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 15px;
                transition: opacity 0.15s, transform 0.15s;
            }
            #playPauseBtn:hover { 
                opacity: 0.85; 
                transform: scale(1.08);
            }
            .progress-row {
                display: flex;
                align-items: center;
                gap: 10px;
                width: 100%;
                max-width: 420px;
            }
            .time-label { 
                font-size: 11px; 
                color: #8888aa; 
                min-width: 32px; 
            }
            .time-label.right { 
                text-align: right; 
            }
            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                height: 4px;
                border-radius: 99px;
                background: #222228;
                outline: none;
                cursor: pointer;
                transition: height 0.15s;
            }
            input[type="range"]:hover { 
                height: 6px; 
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 14px; height: 14px;
                border-radius: 50%;
                background: white;
                cursor: pointer;
                box-shadow: 0 0 6px rgba(0,0,0,0.4);
            }
            #seekBar {
                --pct: 0%;
                background: linear-gradient(to right, #108028 var(--pct), #222228 var(--pct));
            }
            .player-right {
                display: flex;
                align-items: center;
                gap: 14px;
                flex: 1;
                justify-content: flex-end;
            }
            #volumeBar {
                width: 90px;
                --pct: 100%;
                background: linear-gradient(to right, #108028 var(--pct), #222228 var(--pct));
            }
            #expandBtn {
                background: none;
                border: none;
                color: #8888aa;
                font-size: 14px;
                cursor: pointer;
                transition: color 0.15s;
            }
            #expandBtn:hover { 
                color: #f0f0f5; 
            }
            .loading-state {
                text-align: center;
                padding: 60px 0;
                color: #8888aa;
            }
            .spinner {
                width: 36px; 
                height: 36px;
                border: 3px solid #222228;
                border-top-color: #108028;
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
                margin: 0 auto 14px;
            }
            @keyframes spin { 
                to { 
                    transform: rotate(360deg);
                } 
            }
            .song-card .cover.no-art {
                width: 100%;
                aspect-ratio: 1/1;
                background: #222228;
                border-radius: 9px;
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #8888aa;
                font-size: 2rem;
            }
            .load-more-btn {
                display: block;
                margin: 22px auto 0;
                padding: 12px 36px;
                border: 1.5px solid #222228;
                border-radius: 999px;
                background: #111115;
                color: #f0f0f5;
                font-family: 'DM Sans', sans-serif;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.15s, border-color 0.15s;
            }
            .load-more-btn:hover { 
                background: #18181e; 
                border-color: #108028; 
            }
            .toast {
                position: fixed;
                bottom: calc(80px + 16px);
                left: 50%;
                transform: translateX(-50%) translateY(12px);
                background: #222228;
                color: #f0f0f5;
                padding: 10px 20px;
                border-radius: 999px;
                font-size: 13px;
                opacity: 0;
                transition: opacity 0.25s, transform 0.25s;
                pointer-events: none;
                white-space: nowrap;
                z-index: 2000;
            }
            .toast.toast-show { 
                opacity: 1; 
                transform: translateX(-50%) translateY(0); 
            }
            .song-card.loading .play-overlay { 
                opacity: 1; 
            }
            .song-card.loading .play-overlay i { 
                animation: spin 0.7s linear infinite; 
            }
            @media (max-width: 600px) {
                .player-info { 
                    min-width: 120px; 
                    flex: 1; 
                }
                .player-right { 
                    display: none; 
                }
                .player-controls { 
                    flex: 3; 
                }
                #playerTitle { 
                    max-width: 110px; 
                }
                #playerArtist { 
                    max-width: 110px; 
                }
            }
        </style>
    </head>
    <body>
        <main>
            <center>
                <div class="container">
                    <h1 class="tptxt">
                        Music
                    </h1>
                    <div id="mainPage">
                        <div class="search-box">
                            <input id="searchInput" class="button" placeholder="Search Songs">
                            <button class="button" onclick="searchSongs()">
                                Search
                            </button>
                        </div>
                        <div id="results">
                        </div>
                    </div>
                    <div id="detailPage" style="display:none;">
                    </div>
                </div>
                <div id="player">
                    <div class="player-info">
                        <div id="playerThumb">
                            <i class="fa-solid fa-music">
                            </i>
                        </div>
                        <div class="player-text">
                            <div id="playerTitle" class="btxt">
                                No Track Selected
                            </div>
                            <div id="playerArtist" onclick="goToCurrentArtist()">
                                —
                            </div>
                        </div>
                    </div>
                    <div class="player-controls">
                        <div class="player-btns">
                            <button class="ctrl-btn" id="loopBtn" onclick="toggleLoop()" title="Loop">
                                <i class="fa-solid fa-repeat">
                                </i>
                            </button>
                            <button class="ctrl-btn" onclick="seekRelative(-10)" title="-10s">
                                <i class="fa-solid fa-backward-step">
                                </i>
                            </button>
                            <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">
                                <i class="fa-solid fa-play" id="playIcon">
                                </i>
                            </button>
                            <button class="ctrl-btn" onclick="seekRelative(10)" title="+10s">
                                <i class="fa-solid fa-forward-step">
                                </i>
                            </button>
                            <button class="ctrl-btn" onclick="downloadCurrent()" title="Download / Open Source">
                                <i class="fa-solid fa-arrow-up-right-from-square">
                                </i>
                            </button>
                        </div>
                        <div class="progress-row">
                            <span class="time-label" id="timeCurrent">
                                0:00
                            </span>
                            <input type="range" id="seekBar" min="0" max="100" value="0">
                            <span class="time-label right" id="timeDuration">
                                0:00
                            </span>
                        </div>
                    </div>
                    <div class="player-right">
                        <i class="fa-solid fa-volume-high" style="color:#8888aa;font-size:14px;">
                        </i>
                        <input type="range" id="volumeBar" min="0" max="100" value="100">
                    </div>
                </div>
            </center>
        </main>
        <audio id="audio">
        </audio>
        <script src="music.js">
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
        </script>
        <script src="frame.js">
        </script>
    </body>
</html>
